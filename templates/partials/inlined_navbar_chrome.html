    <script>
function updateToggleIcon() {
    const toggleButton = document.getElementById('darkModeToggle');
    const isDark = document.documentElement.classList.contains('dark-mode');
    if (toggleButton) {
        toggleButton.textContent = isDark ? '🌝' : '🌚';
    }
}

function setupDarkModeToggle() {
    const toggleButton = document.getElementById('darkModeToggle');
    if (!toggleButton) return;
    toggleButton.addEventListener('click', () => {
        const html = document.documentElement;
        html.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', html.classList.contains('dark-mode') ? '1' : '0');
        updateToggleIcon();
    });
    updateToggleIcon();
}

function setupPrimaryNav() {
    const toggle = document.querySelector('.nav-toggle');
    const menu = document.getElementById('primary-menu');
    if (!toggle || !menu) return;

    const close = () => {
        toggle.setAttribute('aria-expanded', 'false');
        menu.classList.remove('is-open');
    };
    const open = () => {
        toggle.setAttribute('aria-expanded', 'true');
        menu.classList.add('is-open');
    };

    toggle.addEventListener('click', () => {
        toggle.getAttribute('aria-expanded') === 'true' ? close() : open();
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && toggle.getAttribute('aria-expanded') === 'true') {
            close();
            toggle.focus();
        }
    });

    document.addEventListener('click', (e) => {
        if (toggle.getAttribute('aria-expanded') !== 'true') return;
        if (!menu.contains(e.target) && !toggle.contains(e.target)) close();
    });

    menu.addEventListener('click', (e) => {
        if (e.target.closest('a')) close();
    });
}

function setupHeaderScrollTitle() {
    const header = document.querySelector('.site-header');
    const sectionTitle = document.querySelector('.site-section-title');
    if (!header || !sectionTitle) return;

    const updateHeaderHeight = () => {
        document.documentElement.style.setProperty('--current-header-height', header.offsetHeight + 'px');
    };

    const update = () => {
        const scrolled = window.scrollY > 96;
        header.classList.toggle('is-scrolled', scrolled);
        sectionTitle.hidden = !scrolled;
        window.requestAnimationFrame(updateHeaderHeight);
    };

    sectionTitle.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    update();
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', updateHeaderHeight);
}

function initNavbarChrome() {
    setupDarkModeToggle();
    setupPrimaryNav();
    setupHeaderScrollTitle();
}

if (document.readyState === 'loading' && !document.querySelector('.site-header')) {
    document.addEventListener('DOMContentLoaded', initNavbarChrome, { once: true });
} else {
    initNavbarChrome();
}
    </script>
